<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="DagTimer">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>DagTimer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;background:#000;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const e=React.createElement,{useState,useEffect,useRef,useCallback}=React;

const C={bg:"#000",card:"#0a0a0a",cardBorder:"#141414",glow:"#d4a054",actBg:"#0d0b08",actBorder:"#2a2010",ok:"#22c55e",okBg:"#040d04",okBorder:"#0a1a0a",text:"#e8e4de",dim:"#3d3830",mut:"#666",accent:"#d4a054",train:"#22c55e",creative:"#a78bba",read:"#c4956a",focus:"#5b8fb9"};

const DN=["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];
const DS=["Søn","Man","Tir","Ons","Tor","Fre","Lør"];

// Editable labels — defaults with specific book titles
const LABEL_DEFAULTS={
  "deep-1":"Stewart: Calculus — Early Transcendentals",
  "deep-2":"Young & Freedman: University Physics",
  "deep-3":"Stewart: Calculus — Early Transcendentals",
  "deep-4":"Young & Freedman: University Physics",
  "deep-5":"Atkins: Chemical Principles",
  "deep-6":"Essay",
  "read-0":"Frit valg",
  "read-1":"Harari: Sapiens",
  "read-2":"Skønlitteratur",
  "read-3":"Popper: Conjectures and Refutations",
  "read-4":"Skønlitteratur",
  "read-5":"Roberts: The Penguin History of Europe",
  "read-6":"Skønlitteratur"
};
// Short display names for the activity card title
const DEEP_SHORT={"deep-1":"Calculus","deep-2":"Fysik","deep-3":"Calculus","deep-4":"Fysik","deep-5":"Kemi","deep-6":"Essay"};

const LABELS_KEY="dtimer-labels-v2";
function loadLabels(){try{const v=localStorage.getItem(LABELS_KEY);return v?{...LABEL_DEFAULTS,...JSON.parse(v)}:{...LABEL_DEFAULTS}}catch{return{...LABEL_DEFAULTS}}}
function saveLabels(l){try{localStorage.setItem(LABELS_KEY,JSON.stringify(l))}catch{}}

function getActs(di,labels){
  if(di===0)return[
    {id:"morgen",label:"Morgen-rutine",icon:"☀️",dur:15,color:C.focus,sub:"Sol · Pust · Kold"},
    {id:"anki",label:"Anki",icon:"🧠",dur:20,color:C.accent,sub:"Vedligehold"},
    {id:"japanese",label:"Japansk",icon:"🎧",dur:20,color:C.train,sub:"Passiv lytning"},
    {id:"reading",label:"Læsning",icon:"📖",dur:120,color:C.read,sub:labels["read-0"]||LABEL_DEFAULTS["read-0"],editKey:"read-0"}
  ];
  const cfgs={
    1:{ds:"Opgavebaseret",tr:"Pull A",br:null},
    2:{ds:"Mekanik + opgaver",tr:"Push B",br:null},
    3:{ds:"Opgavebaseret",tr:"Legs",br:null},
    4:{ds:"Elektromagnetisme",tr:"Pull B",br:"Statistik"},
    5:{ds:"Opgavebaseret",tr:"Push A",br:null},
    6:{ds:"Ugentlig essay-dag",tr:"Legs",br:null}
  };
  const c=cfgs[di];
  const deepBook=labels["deep-"+di]||LABEL_DEFAULTS["deep-"+di];
  const deepShort=DEEP_SHORT["deep-"+di]||deepBook;
  const readBook=labels["read-"+di]||LABEL_DEFAULTS["read-"+di];
  const a=[
    {id:"morgen",label:"Morgen-rutine",icon:"☀️",dur:15,color:C.focus,sub:"Sol · Pust · Kold"},
    {id:"anki",label:"Anki",icon:"🧠",dur:45,color:C.accent,sub:"Japansk · Dansk · Engelsk"},
    {id:"deep",label:deepShort,icon:"📐",dur:c.br?90:160,color:C.accent,sub:deepBook,editKey:"deep-"+di}
  ];
  if(c.br)a.push({id:"breadth",label:c.br,icon:"📊",dur:70,color:C.focus,sub:"Breddeblok"});
  a.push(
    {id:"walk",label:"Gåtur",icon:"🚶",dur:20,color:C.dim,sub:"Uden input"},
    {id:"training",label:c.tr,icon:"💪",dur:90,color:C.train},
    {id:"japanese",label:"Japansk",icon:"🎧",dur:40,color:C.train,sub:"Lytning + shadowing"},
    {id:"guitar",label:"Guitar",icon:"🎸",dur:60,color:C.creative,sub:"Deliberate practice"},
    {id:"reading",label:"Læsning",icon:"📖",dur:120,color:C.read,sub:readBook,editKey:"read-"+di},
    {id:"journal",label:"Journaling",icon:"✍️",dur:30,color:C.accent}
  );
  return a;
}

const dateKey=()=>new Date().toISOString().slice(0,10);
const SK="dtimer-v5-";
const store={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

function fmt(s){
  if(s<=0)return"0:00";
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return h>0?h+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0"):m+":"+String(sec).padStart(2,"0");
}
function fmtS(s){
  if(s<=0)return"Færdig";
  const h=Math.floor(s/3600),m=Math.ceil((s%3600)/60);
  return h>0&&m>0?h+"t "+m+"m":h>0?h+"t":m+"m";
}

function EditModal({title,value,onSave,onClose}){
  const[val,setVal]=useState(value);
  const ref=useRef(null);
  useEffect(()=>{setTimeout(()=>{if(ref.current){ref.current.focus();ref.current.select()}},100)},[]);
  return e("div",{onClick:ev=>{if(ev.target===ev.currentTarget)onClose()},style:{
    position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:50,
    display:"flex",alignItems:"flex-end",justifyContent:"center",
    animation:"fadeIn .2s ease"
  }},
    e("div",{style:{
      background:"#0a0a0a",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:480,
      padding:"20px 20px 32px",borderTop:"1px solid #1a1a1a",
      animation:"slideUp .25s ease"
    }},
      e("div",{style:{fontSize:14,fontWeight:700,marginBottom:14,color:C.text}},title),
      e("input",{ref:ref,type:"text",value:val,
        onChange:ev=>setVal(ev.target.value),
        onKeyDown:ev=>{if(ev.key==="Enter"&&val.trim()){onSave(val.trim());onClose()}},
        style:{
          background:"#050505",color:C.text,border:"1px solid #1a1a1a",borderRadius:10,
          padding:"10px 12px",fontSize:14,width:"100%",outline:"none",
          fontFamily:"inherit",WebkitAppearance:"none"
        },
        placeholder:"Skriv ny værdi..."
      }),
      e("div",{style:{display:"flex",gap:8,marginTop:16}},
        e("button",{onClick:onClose,style:{
          flex:1,padding:"11px 0",borderRadius:10,border:"1px solid #1a1a1a",
          background:"#000",color:C.mut,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"
        }},"Annullér"),
        e("button",{onClick:()=>{if(val.trim()){onSave(val.trim());onClose()}},style:{
          flex:1,padding:"11px 0",borderRadius:10,border:"none",
          background:"linear-gradient(135deg,#d4a054,#e8c88a)",color:"#000",
          fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"
        }},"Gem")
      )
    )
  );
}

function App(){
  const todayIdx=new Date().getDay();
  const[di,setDi]=useState(todayIdx);
  const[timers,setTimers]=useState({});
  const[active,setActive]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[labels,setLabels]=useState(loadLabels);
  const[editing,setEditing]=useState(null);
  const lastTick=useRef(Date.now());
  const acts=getActs(di,labels);
  const isToday=di===todayIdx;

  const wakeLock=useRef(null);
  useEffect(()=>{
    if(!active){if(wakeLock.current){wakeLock.current.release().catch(()=>{});wakeLock.current=null}return}
    if('wakeLock' in navigator){navigator.wakeLock.request('screen').then(l=>{wakeLock.current=l}).catch(()=>{})}
    return()=>{if(wakeLock.current){wakeLock.current.release().catch(()=>{});wakeLock.current=null}};
  },[active]);

  useEffect(()=>{
    const key=SK+dateKey()+"-"+di;
    const saved=store.get(key);
    if(saved){setTimers(saved.timers||{});setActive(isToday?(saved.active||null):null)}
    else{const init={};acts.forEach(a=>{init[a.id]=a.dur*60});setTimers(init);setActive(null)}
    setLoaded(true);
  },[di,labels]);

  const save=useCallback((t,a)=>{store.set(SK+dateKey()+"-"+di,{timers:t,active:a})},[di]);

  useEffect(()=>{
    if(!isToday||!active||!loaded)return;
    const iv=setInterval(()=>{
      const now=Date.now(),elapsed=Math.round((now-lastTick.current)/1000);
      if(elapsed<1)return;lastTick.current=now;
      setTimers(prev=>{
        const next={...prev},rem=(next[active]||0)-elapsed;
        next[active]=Math.max(0,rem);
        if(rem<=0){setActive(null);save(next,null)}else save(next,active);
        return next;
      });
    },1000);
    return()=>clearInterval(iv);
  },[active,isToday,loaded,save]);

  const toggle=id=>{
    if(!isToday||(timers[id]||0)<=0)return;
    lastTick.current=Date.now();
    const next=active===id?null:id;
    setActive(next);save(timers,next);
  };
  const reset=()=>{const init={};acts.forEach(a=>{init[a.id]=a.dur*60});setTimers(init);setActive(null);save(init,null)};

  const openEdit=act=>{
    if(!act.editKey)return;
    const isDeep=act.editKey.startsWith("deep-");
    setEditing({key:act.editKey,title:(isDeep?"Dybdefag":"Læsning")+" — "+DN[di],value:labels[act.editKey]||""});
  };
  const saveLabel=val=>{
    if(!editing)return;
    const next={...labels,[editing.key]:val};
    setLabels(next);saveLabels(next);
  };

  const totalRem=acts.reduce((s,a)=>s+(timers[a.id]||0),0);
  const totalDur=acts.reduce((s,a)=>s+a.dur*60,0);
  const pct=totalDur>0?Math.max(0,Math.min(100,((totalDur-totalRem)/totalDur)*100)):0;
  const doneCount=acts.filter(a=>(timers[a.id]||0)<=0).length;

  if(!loaded)return e("div",{style:{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
    e("div",{style:{color:C.dim,fontSize:14}},"Indlæser..."));

  return e("div",{style:{background:C.bg,minHeight:"100vh",color:C.text,maxWidth:480,margin:"0 auto",padding:"env(safe-area-inset-top, 16px) 12px 80px",WebkitFontSmoothing:"antialiased"}},

    e("div",{style:{display:"flex",gap:4,marginBottom:20,overflowX:"auto",paddingBottom:4,paddingTop:8}},
      DS.map((d,i)=>e("button",{key:i,onClick:()=>setDi(i),style:{
        padding:"7px 14px",fontSize:12,fontWeight:i===di?700:500,borderRadius:8,
        border:i===todayIdx&&i!==di?"1px solid "+C.cardBorder:"1px solid transparent",
        background:i===di?C.actBg:"transparent",
        color:i===di?C.glow:i===todayIdx?C.text:C.mut,
        cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,fontFamily:"inherit"
      }},d+(i===todayIdx?" ●":"")))
    ),

    e("div",{style:{marginBottom:24}},
      e("div",{style:{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:8}},
        e("div",null,
          e("span",{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:32,fontWeight:700,color:totalRem===0?C.ok:C.text,letterSpacing:"-.03em"}},fmtS(totalRem)),
          totalRem>0?e("span",{style:{fontSize:12,color:C.dim,marginLeft:8}},"tilbage"):
          e("span",{style:{fontSize:12,color:C.ok,marginLeft:8}},"— alt klaret ✓")
        ),
        e("div",{style:{fontSize:11,color:C.dim,fontFamily:"'JetBrains Mono',monospace"}},doneCount+"/"+acts.length)
      ),
      e("div",{style:{height:3,background:C.cardBorder,borderRadius:2,overflow:"hidden"}},
        e("div",{style:{height:"100%",borderRadius:2,background:pct>=100?C.ok:"linear-gradient(90deg,"+C.glow+","+C.glow+"dd)",width:pct+"%",transition:"width 1s linear"}})
      )
    ),

    e("div",{style:{display:"flex",flexDirection:"column",gap:6}},
      acts.map((act,idx)=>{
        const rem=timers[act.id]||0,tot=act.dur*60,done=rem<=0,isAct=active===act.id;
        const p=tot>0?Math.max(0,Math.min(100,((tot-rem)/tot)*100)):100;
        const editable=!!act.editKey;
        let bg=C.card,bd=C.cardBorder;
        if(done){bg=C.okBg;bd=C.okBorder}else if(isAct){bg=C.actBg;bd=C.actBorder}

        return e("div",{key:act.id+"-"+idx,onClick:()=>toggle(act.id),style:{
          background:bg,border:"1px solid "+bd,borderRadius:12,
          padding:isAct?"14px 14px 12px":"11px 14px 9px",
          cursor:isToday&&!done?"pointer":"default",
          opacity:done?.45:1,transition:"all .2s ease",
          animation:"slideIn .3s ease "+idx*.04+"s both",
          position:"relative",overflow:"hidden"
        }},
          isAct&&e("div",{style:{position:"absolute",left:0,top:0,bottom:0,width:3,background:C.glow,borderRadius:"2px 0 0 2px"}}),
          e("div",{style:{display:"flex",alignItems:"center",gap:10}},
            e("div",{style:{width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}},
              done?e("span",{style:{fontSize:16,color:C.ok}},"✓"):e("span",null,act.icon)),
            e("div",{style:{flex:1,minWidth:0}},
              e("div",{style:{display:"flex",alignItems:"center",gap:6}},
                e("span",{style:{fontSize:14,fontWeight:600,color:done?C.mut:C.text}},act.label),
                isAct&&e("span",{style:{width:6,height:6,borderRadius:3,background:C.glow,animation:"pulse 1.5s ease-in-out infinite",flexShrink:0}}),
                editable&&!done&&e("span",{onClick:ev=>{ev.stopPropagation();openEdit(act)},style:{
                  fontSize:10,color:C.dim,cursor:"pointer",padding:"2px 6px",
                  borderRadius:4,background:"#111",marginLeft:2,flexShrink:0
                }},"✎")
              ),
              act.sub&&!done&&e("div",{style:{fontSize:11,color:C.dim,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},act.sub)
            ),
            e("div",{style:{textAlign:"right",flexShrink:0}},
              done?e("div",{style:{fontSize:11,color:C.ok,fontWeight:600}},"Færdig"):
              isAct?e("div",{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:20,fontWeight:700,color:C.glow,letterSpacing:"-.02em"}},fmt(rem)):
              e("div",{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:500,color:C.mut}},fmtS(rem)),
              !done&&!isAct&&e("div",{style:{fontSize:9,color:C.dim,marginTop:1}},"af "+act.dur+"m")
            )
          ),
          !done&&e("div",{style:{height:2,background:isAct?C.actBorder:C.cardBorder,borderRadius:1,marginTop:8,overflow:"hidden"}},
            e("div",{style:{height:"100%",borderRadius:1,background:isAct?C.glow:(act.color||C.mut)+"88",width:p+"%",transition:"width 1s linear"}}))
        );
      })
    ),

    isToday&&!active&&totalRem>0&&e("div",{style:{textAlign:"center",marginTop:16,padding:"10px 0",fontSize:12,color:C.dim,fontStyle:"italic"}},"Tryk en aktivitet for at starte"),
    !isToday&&e("div",{style:{textAlign:"center",marginTop:16,padding:"10px 0",fontSize:12,color:C.dim}},"Timere kan kun styres på dagens dato"),

    e("div",{style:{marginTop:24,display:"flex",gap:8}},
      isToday&&e("button",{onClick:reset,style:{flex:1,padding:"11px 0",borderRadius:10,border:"1px solid "+C.cardBorder,background:C.card,color:C.mut,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}},"Nulstil dag"),
      isToday&&active&&e("button",{onClick:()=>{setActive(null);save(timers,null)},style:{flex:1,padding:"11px 0",borderRadius:10,border:"none",background:C.actBorder,color:C.glow,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}},"Pause alt")
    ),

    e("div",{style:{marginTop:16,padding:"12px 14px",background:C.card,border:"1px solid "+C.cardBorder,borderRadius:10,fontSize:11,color:C.dim,lineHeight:1.5}},
      DN[di]+" — "+acts.length+" aktiviteter — budget: "+fmtS(totalDur),
      e("br"),"Tryk ✎ på dybde- eller læsningsfelter for at ændre bog/materiale."
    ),

    editing&&e(EditModal,{title:editing.title,value:editing.value,onSave:saveLabel,onClose:()=>setEditing(null)})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{})})}
</script>
</body>
</html>
